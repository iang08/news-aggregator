# sources.yaml
# RSS feeds for the morning news aggregator.
#
# Each source has:
#   name:           Display name (used in your morning brief)
#   url:            RSS or Atom feed URL
#   category:       Groups sources in your brief: ai, tech, world, japan, science, philosophy, cars
#   weight:         Trust multiplier (0.5 = down-weight, 2.0 = trust heavily). Default 1.0.
#   last_reviewed:  Date you last consciously evaluated this source. Update when reviewed.
#
# Quarterly: run `python -m aggregator.review` to see source quality stats.
# Edit this file freely — no code changes needed after edits.
#
# TODO: revisit broken feeds (logged in BROKEN_FEEDS.md):
#   - Anthropic News, NHK World English, Nikkei Asia, Speedhunters

